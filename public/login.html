<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Glassmorphism</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #6b7280 0%, #000000 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background bubbles for water effect */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 15s infinite;
        }

        .bubble:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 60px; height: 60px; top: 60%; right: 15%; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 100px; height: 100px; bottom: 20%; left: 20%; animation-delay: 4s; }
        .bubble:nth-child(4) { width: 50px; height: 50px; top: 30%; right: 30%; animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-50px) rotate(180deg); opacity: 0.6; }
        }

        /* Main glass container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), inset 0 0 20px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        /* Water glass reflection effect */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 50%, transparent 100%);
            border-radius: 20px 20px 0 0;
            pointer-events: none;
        }

        /* Shine effect on hover */
        .login-container:hover::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
            animation: shine 1.5s;
        }

        @keyframes shine { 100% { left: 100%; } }

        .login-header { text-align: center; margin-bottom: 30px; color: #ffffff; }
        .login-header h2 { font-size: 28px; font-weight: 600; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3); }
        .login-header p { font-size: 14px; color: rgba(255, 255, 255, 0.7); }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; color: rgba(255, 255, 255, 0.9); font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder { color: rgba(255, 255, 255, 0.5); }
        .form-group input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.15) 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.15);
        }

        .divider { display: flex; align-items: center; margin: 25px 0; color: rgba(255, 255, 255, 0.5); font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.2); }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        .links { text-align: center; margin-top: 20px; }
        .links a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 14px; transition: color 0.3s ease; }
        .links a:hover { color: #ffffff; text-decoration: underline; }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 480px) {
            .login-container { width: 90%; padding: 30px 20px; }
            .login-header h2 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>

    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Please sign in to continue</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
        </form>

        <div class="divider">or</div>
        <div class="links"><a href="#">Forgot Password?</a> | <a href="#">Create Account</a></div>
    </div>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        
        // Ripple Effect logic
        submitBtn.addEventListener('mousedown', function(e) {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = submitBtn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size/2}px`;
            ripple.style.top = `${e.clientY - rect.top - size/2}px`;
            submitBtn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });

        // Updated Login Submission to Backend API
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.innerText = "Checking...";
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.7";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success: Store user session
                    localStorage.setItem('cursor_session', JSON.stringify(data.user));
                    window.location.href = '/index.html';
                } else {
                    // Fail: Show error message
                    alert('Login Error: ' + data.error);
                    submitBtn.innerText = "Sign In";
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = "1";
                }
            } catch (err) {
                alert('Connection Failed: Check your Vercel/Turso setup.');
                submitBtn.innerText = "Sign In";
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
